name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slice: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Restore duration cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: test_durations.json
          # Single stable key. main always overwrites, PRs always find it.
          key: test-durations

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          # Persist uv's download/wheel cache (~/.cache/uv) across runs.
          # Keyed on the dependency manifests, so the cache is reused until
          # pyproject.toml or uv.lock changes. `uv sync` still runs every
          # time, but resolves from the warm cache instead of re-downloading
          # and re-building wheels.
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        # `uv sync --locked` installs the exact pinned set from uv.lock (and
        # fails if the lock is out of sync with pyproject.toml), giving a
        # reproducible env. It also creates .venv itself, so no separate
        # `uv venv` step is needed.
        run: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Minimize uv cache
        # Optimized for CI: prunes pre-built wheels that are cheap to
        # re-download, keeping the persisted cache small and fast to restore.
        run: uv cache prune --ci

      - name: Diagnose shard 3 source state
        if: ${{ matrix.slice == 3 }}
        run: |
          set +e

          echo "== GitHub context =="
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_HEAD_REF=$GITHUB_HEAD_REF"
          echo "GITHUB_BASE_REF=$GITHUB_BASE_REF"
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"

          echo "== Checkout state =="
          pwd
          git rev-parse HEAD
          git log -1 --oneline
          git status --porcelain=v1

          echo "== Tracked source comparisons =="
          for file in \
            tests/run_agent/test_run_agent.py \
            tests/hermes_cli/test_goals.py \
            tests/hermes_cli/test_kanban_specify.py \
            tests/hermes_cli/test_commands.py
          do
            echo "-- $file --"
            git rev-parse "HEAD:$file" || true
            git hash-object "$file" || true
            sha256sum "$file" || true
            stat "$file" || true
            tmp_head="$RUNNER_TEMP/head-$(basename "$file")"
            git show "HEAD:$file" > "$tmp_head" 2>/dev/null || true
            cmp -s "$file" "$tmp_head" \
              && echo "$file: matches HEAD" \
              || echo "$file: DOES NOT MATCH HEAD"
          done

          echo "== test_run_agent assertion context =="
          grep -n -C 4 -E \
            'Invalid API response|invalid response|test_invalid_response_returns_error_not_crash' \
            tests/run_agent/test_run_agent.py || true

          echo "== Python paths and versions =="
          source .venv/bin/activate
          command -v python || true
          command -v pytest || true
          readlink -f "$(command -v python)" || true
          readlink -f "$(command -v pytest)" || true
          python --version || true
          python -m pytest --version || true
          uv --version || true
          echo "PYTHONPATH=${PYTHONPATH-}"
          echo "PYTHONDONTWRITEBYTECODE=${PYTHONDONTWRITEBYTECODE-}"
          echo "VIRTUAL_ENV=${VIRTUAL_ENV-}"
          echo "HOME=${HOME-}"
          echo "TMPDIR=${TMPDIR-}"

          echo "== Python import diagnostics =="
          python - <<'PY' || true
          import importlib
          import importlib.util
          import site
          import sys

          print("sys.executable:", sys.executable)
          print("sys.version:", sys.version)
          print("sys.prefix:", sys.prefix)
          print("sys.base_prefix:", sys.base_prefix)
          print("sys.path:")
          for entry in sys.path:
              print("  ", entry)

          print("sitepackages:", site.getsitepackages())
          print("usersite:", site.getusersitepackages())

          names = [
              "utils",
              "hermes_cli.auth",
              "gateway.run",
              "agent.account_usage",
          ]

          for name in names:
              print(f"\nMODULE {name}")
              try:
                  spec = importlib.util.find_spec(name)
                  print("spec.origin:", getattr(spec, "origin", None))
                  module = importlib.import_module(name)
                  print("__file__:", getattr(module, "__file__", None))
                  print("__cached__:", getattr(module, "__cached__", None))
                  if name == "utils":
                      print("has env_float:", hasattr(module, "env_float"))
              except Exception as exc:
                  print("IMPORT ERROR:", type(exc).__name__, repr(exc))
          PY

          echo "== Bytecode and cache diagnostics =="
          echo "Repo pyc count:"
          find . \
            -path './.venv' -prune -o \
            -type f \( -name '*.pyc' -o -name '*.pyo' \) -print \
            | tee "$RUNNER_TEMP/repo-pyc.txt" \
            | wc -l

          echo "Relevant repo bytecode:"
          grep -E \
            'utils|hermes_cli|gateway|account_usage|test_run_agent|test_goals|test_kanban_specify|test_commands' \
            "$RUNNER_TEMP/repo-pyc.txt" || true

          echo "Relevant venv bytecode:"
          find .venv -type f \( -name '*.pyc' -o -name '*.pyo' \) \
            | grep -E 'utils|hermes_cli|gateway|account_usage' \
            | head -200 || true

          echo "Ignored working-tree files:"
          git status --short --ignored | head -200

      - name: Create shard 3 runtime pytest probe
        if: ${{ matrix.slice == 3 }}
        run: |
          cat > "$RUNNER_TEMP/ci_runtime_probe.py" <<'PY'
          import dis
          import hashlib
          import importlib.util
          import inspect
          import linecache
          import os
          import pathlib
          import sys

          TARGET = (
              "tests/run_agent/test_run_agent.py::"
              "TestRetryExhaustion::"
              "test_invalid_response_returns_error_not_crash"
          )

          def _hash_file(path):
              try:
                  data = pathlib.Path(path).read_bytes()
                  return hashlib.sha256(data).hexdigest()
              except Exception as exc:
                  return f"ERROR: {type(exc).__name__}: {exc!r}"

          def pytest_collection_modifyitems(session, config, items):
              for item in items:
                  if item.nodeid != TARGET:
                      continue

                  print("\n=== CI RUNTIME PROBE BEGIN ===")

                  func = getattr(item, "function", None)
                  module = getattr(item, "module", None)
                  code = getattr(func, "__code__", None)

                  print("nodeid:", item.nodeid)
                  print("cwd:", os.getcwd())
                  print("sys.executable:", sys.executable)
                  print("module:", getattr(module, "__name__", None))
                  print("module.__file__:", getattr(module, "__file__", None))
                  print("module.__cached__:", getattr(module, "__cached__", None))
                  print("function:", repr(func))

                  loaded_utils = sys.modules.get("utils")
                  if loaded_utils is not None:
                      utils_file = getattr(loaded_utils, "__file__", None)
                      print("utils.__file__:", utils_file)
                      print("utils.__cached__:", getattr(loaded_utils, "__cached__", None))
                      print("utils sha256:", _hash_file(utils_file or ""))
                      print("utils has env_float:", hasattr(loaded_utils, "env_float"))
                      print(
                          "utils env names:",
                          sorted(
                              name
                              for name in vars(loaded_utils)
                              if name.startswith("env_")
                          ),
                      )

                  if code is not None:
                      filename = code.co_filename
                      first_line = code.co_firstlineno

                      print("co_filename:", filename)
                      print("co_firstlineno:", first_line)
                      print("co_name:", code.co_name)
                      print("co_consts:", repr(code.co_consts))
                      print("source sha256:", _hash_file(filename))

                      try:
                          print(
                              "standard cache path:",
                              importlib.util.cache_from_source(code.co_filename),
                          )
                      except Exception as exc:
                          print("cache path error:", repr(exc))

                      print("--- open() source around function ---")
                      try:
                          lines = pathlib.Path(filename).read_text(
                              encoding="utf-8"
                          ).splitlines()
                          start = max(0, first_line - 3)
                          end = min(len(lines), first_line + 25)
                          for number in range(start, end):
                              print(f"{number + 1}: {lines[number]}")
                      except Exception as exc:
                          print("open source error:", type(exc).__name__, repr(exc))

                      print("--- linecache source around function ---")
                      for number in range(
                          max(1, first_line - 2),
                          first_line + 25,
                      ):
                          print(
                              f"{number}: "
                              f"{linecache.getline(filename, number).rstrip()}"
                          )

                      print("--- inspect.getsource ---")
                      try:
                          print(inspect.getsource(func))
                      except Exception as exc:
                          print("inspect error:", type(exc).__name__, repr(exc))

                      print("--- disassembly ---")
                      try:
                          dis.dis(func)
                      except Exception as exc:
                          print("dis error:", type(exc).__name__, repr(exc))

                  print("--- relevant sys.modules ---")
                  for name, loaded in sorted(sys.modules.items()):
                      if any(
                          token in name
                          for token in (
                              "test_run_agent",
                              "run_agent",
                              "utils",
                              "hermes_cli.auth",
                          )
                      ):
                          print(
                              name,
                              "file=",
                              getattr(loaded, "__file__", None),
                              "cached=",
                              getattr(loaded, "__cached__", None),
                          )

                  print("=== CI RUNTIME PROBE END ===\n")
          PY

          echo "== pre-shard utils diagnostics =="
          grep -n -C 3 'def env_float' utils.py || true
          sha256sum utils.py
          find . \
            -path './.venv' -prune -o \
            -type f -name '*test_run_agent*.pyc' -print
          find .venv -type f -name '*test_run_agent*.pyc' -print || true

      - name: Run tests (slice ${{ matrix.slice }}/6)
        # Per-file isolation via scripts/run_tests_parallel.py: discovers
        # every test_*.py file under tests/ (excluding integration/ + e2e/),
        # then runs `python -m pytest <file>` in a freshly-spawned subprocess
        # with bounded parallelism. No xdist, no shared workers, no
        # module-level state leakage between files.
        #
        # Why per-file (not per-test): per-test spawn cost (~250ms × 17k
        # tests = 70min CPU minimum) blew the wall-clock budget. Per-file
        # spawn (~250ms × ~850 files = ~3.5min) fits while still giving
        # every file a fresh interpreter — the only isolation boundary
        # that matters in practice (cross-file leakage was the original
        # flake source; intra-file is the test author's responsibility).
        #
        # Why drop xdist entirely: xdist's persistent workers accumulate
        # state across files, which is exactly the leakage we wanted to
        # fix. ThreadPoolExecutor + subprocess.run is ~60 lines and does
        # the job with cleaner semantics.
        #
        # Matrix slicing (--slice I/N): files are distributed across 6
        # jobs by cached duration (LPT algorithm) so each job gets
        # roughly equal wall time. Without a cache, files default to 2s
        # estimate and get split roughly evenly by count — still correct,
        # just not perfectly balanced.
        run: |
          source .venv/bin/activate
          python scripts/run_tests_parallel.py --slice ${{ matrix.slice }}/6
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
          PYTHONPATH: ${{ matrix.slice == 3 && runner.temp || '' }}
          PYTEST_PLUGINS: ${{ matrix.slice == 3 && 'ci_runtime_probe' || '' }}
      - name: Shard 3 post-run bytecode diagnostics
        if: ${{ always() && matrix.slice == 3 }}
        run: |
          find . \
            -path './.venv' -prune -o \
            -type f -name '*test_run_agent*.pyc' \
            -print -exec stat {} \; -exec sha256sum {} \;

          find .venv \
            -type f -name '*test_run_agent*.pyc' \
            -print -exec stat {} \; -exec sha256sum {} \; || true


      - name: Upload per-slice durations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-durations-slice-${{ matrix.slice }}
          path: test_durations.json
          retention-days: 1

  # Merge per-slice duration data into a single cache, so future runs
  # (including PRs) get balanced slicing.
  save-durations:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all slice durations
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test-durations-slice-*
          path: durations
          merge-multiple: true

      - name: Merge into single durations file
        run: |
          python3 -c "
          import json, glob, os
          merged = {}
          for f in glob.glob('durations/*test_durations.json'):
            with open(f) as fh:
              merged.update(json.load(fh))
          with open('test_durations.json', 'w') as fh:
            json.dump(merged, fh, indent=2, sort_keys=True)
          print(f'Merged {len(merged)} file durations')
          "

      - name: Save merged duration cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: test_durations.json
          key: test-durations

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          # Persist uv's download/wheel cache (~/.cache/uv) across runs.
          # Keyed on the dependency manifests, so the cache is reused until
          # pyproject.toml or uv.lock changes. `uv sync` still runs every
          # time, but resolves from the warm cache instead of re-downloading
          # and re-building wheels.
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        # `uv sync --locked` installs the exact pinned set from uv.lock (and
        # fails if the lock is out of sync with pyproject.toml), giving a
        # reproducible env. It also creates .venv itself, so no separate
        # `uv venv` step is needed.
        run: uv sync --locked --python 3.11 --extra all --extra dev

      - name: Minimize uv cache
        # Optimized for CI: prunes pre-built wheels that are cheap to
        # re-download, keeping the persisted cache small and fast to restore.
        run: uv cache prune --ci

      - name: Packaged-wheel i18n smoke test
        run: |
          source .venv/bin/activate
          python -m pytest -m integration tests/test_wheel_locales_e2e.py -v

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""