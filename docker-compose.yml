services:
  hermes-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: healbite-hermes:latest
    container_name: hermes-bot
    restart: unless-stopped
    working_dir: /home/hermes
    env_file:
      - /home/hermes/.hermes/.env
    environment:
      HOME: /home/hermes
      HF_HOME: /home/hermes/.cache/huggingface
      PYTHONIOENCODING: ${PYTHONIOENCODING:-utf-8}
      LANG: ${LANG:-C.UTF-8}
      LC_ALL: ${LC_ALL:-C.UTF-8}
      MEMORY_VECTOR_ENABLED: ${MEMORY_VECTOR_ENABLED:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-healbite_memory_os}
    volumes:
      - /home/hermes/.hermes:/home/hermes/.hermes
      - /home/hermes/healbite.db:/home/hermes/healbite.db
      - /home/hermes/backups:/home/hermes/backups
      - /home/hermes/.cache/huggingface:/home/hermes/.cache/huggingface
    command: ["hermes", "gateway"]

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
